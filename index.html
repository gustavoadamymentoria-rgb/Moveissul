<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --accent: #8b5e3c;
    --accent2: #c9975a;
    --text: #2c2218;
    --text-muted: #8a7a6a;
    --border: #e0d8cc;
    --user-bubble: #2c2218;
    --bot-bubble: #fffdf8;
    --shadow: 0 4px 24px rgba(44,34,24,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(201,151,90,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,94,60,0.10) 0%, transparent 60%);
  }

  header {
    width: 100%;
    max-width: 720px;
    padding: 36px 24px 20px;
    text-align: center;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { display: block; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin: 16px auto 0;
  }

  .chat-container {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 16px 16px;
    gap: 12px;
  }

  .messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 300px;
    max-height: 60vh;
    overflow-y: auto;
    padding: 20px;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 500;
    margin-top: 2px;
  }

  .avatar.bot {
    background: var(--accent);
    color: #fff;
  }

  .avatar.user {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.92rem;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .message.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-top-right-radius: 4px;
  }

  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0;
  }

  .suggestion-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 99px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .suggestion-chip:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .input-area {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
    box-shadow: var(--shadow);
    align-items: flex-end;

    border: none;
    outline: none;
    resize: none;

    font-size: 0.92rem;
    background: transparent;
    color: var(--text);
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;

    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;

    color: var(--text-muted);
    padding: 12px 16px 20px;
    letter-spacing: 0.03em;
  }

  footer a { color: var(--accent2); text-decoration: none; }
</style>

const history = [];
let isLoading = false;

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🪵' : 'EU';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🪵';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json',
'x-api-key': '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',

      body: JSON.stringify({

function sendSuggestion(btn) {
  document.getElementById('input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
